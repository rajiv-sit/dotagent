name: PLAN.md Weekly Reminder

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9 AM UTC
  workflow_dispatch:  # Allow manual trigger

jobs:
  plan-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Issue - Weekly PLAN.md Update Reminder
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date();
            const weekOf = today.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
            
            const issueTitle = `[Monday Checklist] Update PLAN.md for week of ${weekOf}`;
            const issueBody = `## Weekly PLAN.md Update Reminder

Good morning! ðŸ‘‹

It's time to update **PLAN.md** with this week's progress.

### Checklist
- [ ] **Completed** â€” Add finished work from last week
- [ ] **In-Progress** â€” Update current sprint tasks  
- [ ] **Next** â€” Plan upcoming work
- [ ] **Blockers** â€” Flag any impediments
- [ ] **Verification** â€” Confirm tests pass, docs updated

### PLAN.md Sections

Your PLAN.md should include:

\`\`\`markdown
# Objective
What are we solving this week?

## Completed
- Done: Feature X
- Done: Bug fix Y

## In-Progress
- [ ] Task A - 40% complete
- [ ] Task B - just started

## Next
- [ ] Task C - planned for later
- [ ] Test suite improvements

## Blockers
- Waiting on API response from Service Y

## Verification  
- Unit tests: âœ“ Passing
- Docs updated: âœ“ Yes
- Code reviewed: âœ“ Yes
\`\`\`

### Resources

- [PLAN.md Documentation](https://github.com/${{ github.repository }}/blob/main/PLAN.md)
- [PLAN.md Schema](https://github.com/${{ github.repository }}/blob/main/schemas/plan.schema.json)
- [dotagent Guide](https://github.com/${{ github.repository }}/blob/main/docs/index.md)

### Questions?

See [FAQ](https://github.com/${{ github.repository }}/blob/main/docs/faq.md) or open a discussion.

---
**Bot Note:** This reminder runs every Monday at 9 AM UTC. Dismiss this issue once PLAN.md is updated.`;

            // Check if an issue with this title already exists this week
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'checklist'
            });

            const existingIssue = issues.data.find(issue => 
              issue.title.includes('[Monday Checklist]') &&
              new Date(issue.created_at).toLocaleDateString() === today.toLocaleDateString()
            );

            if (!existingIssue) {
              github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issueTitle,
                body: issueBody,
                labels: ['checklist', 'weekly']
              });
              console.log('âœ“ PLAN.md reminder issue created');
            } else {
              console.log('âœ“ PLAN.md reminder already exists for today');
            }

